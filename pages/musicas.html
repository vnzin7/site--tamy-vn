<div class="secao-musicas fade-in">
    <div class="secao-header">
        <i class="fas fa-music"></i>
        <h2>Nossa Playlist</h2>
    </div>
    
    <div class="card">
        <div class="card-header">
            <h3>🎵 Adicionar Música</h3>
        </div>
        <form id="formMusica" onsubmit="event.preventDefault(); adicionarMusica();">
            <div class="form-grid">
                <div class="form-group">
                    <label>Nome da Música</label>
                    <input type="text" id="nomeMusica" required placeholder="Ex: Perfect">
                </div>
                <div class="form-group">
                    <label>Artista/Banda</label>
                    <input type="text" id="artistaMusica" required placeholder="Ex: Ed Sheeran">
                </div>
                <div class="form-group">
                    <label>Link do YouTube</label>
                    <input type="url" id="linkMusica" required placeholder="https://youtube.com/watch?v=...">
                </div>
                <div class="form-group">
                    <label>Quem Sugeriu</label>
                    <select id="quemSugeriu">
                        <option value="Eu">👨 Eu</option>
                        <option value="Ela">👩 Ela</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn" style="margin-top: 20px; background: linear-gradient(135deg, #9B59B6, #8E44AD);">
                <i class="fas fa-plus"></i> Adicionar à Playlist
            </button>
        </form>
    </div>
    
    <div class="music-player">
        <div style="text-align: center; margin-bottom: 20px;">
            <h3 style="color: var(--vinho);">🎧 Tocando Agora</h3>
            <div id="playerInfo" style="font-size: 1.2rem; margin: 15px 0; color: var(--texto-secundario);">
                Selecione uma música para tocar
            </div>
        </div>
        
        <div class="player-controls">
            <button class="player-btn" onclick="tocarMusicaAleatoria()" title="Modo Surpresa">
                <i class="fas fa-random"></i>
            </button>
            <button class="player-btn" id="btnPlayPause" onclick="togglePlayPause()" title="Play/Pause">
                <i class="fas fa-play"></i>
            </button>
            <button class="player-btn" onclick="pararMusica()" title="Parar">
                <i class="fas fa-stop"></i>
            </button>
        </div>
        
        <audio id="audioPlayer" controls style="width: 100%; margin-top: 15px; border-radius: 10px;"></audio>
    </div>
    
    <div class="card">
        <div class="card-header">
            <h3>🎶 Nossas Músicas</h3>
            <button class="btn btn-sm" onclick="tocarMusicaAleatoria()" style="background: linear-gradient(135deg, #9B59B6, #8E44AD);">
                <i class="fas fa-random"></i> Modo Surpresa
            </button>
        </div>
        <div class="cards-grid" id="gridMusicas">
            <p style="text-align: center; grid-column: 1/-1; padding: 40px;">
                🎵 Nenhuma música adicionada ainda. Comece a construir sua playlist!
            </p>
        </div>
    </div>
</div>
