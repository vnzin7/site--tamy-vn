<div class="secao-datas fade-in">
    <div class="secao-header">
        <i class="fas fa-calendar-heart"></i>
        <h2>Datas Especiais</h2>
    </div>
    
    <div class="card">
        <div class="card-header">
            <h3>💝 Adicionar Data Especial</h3>
        </div>
        <form id="formData" onsubmit="event.preventDefault(); adicionarDataEspecial();">
            <div class="form-grid">
                <div class="form-group">
                    <label>Nome do Evento</label>
                    <input type="text" id="nomeEvento" required placeholder="Ex: Aniversário de Namoro">
                </div>
                <div class="form-group">
                    <label>Data</label>
                    <input type="date" id="dataEvento" required>
                </div>
                <div class="form-group">
                    <label>Tipo de Evento</label>
                    <select id="tipoEvento">
                        <option value="Aniversário">🎂 Aniversário</option>
                        <option value="Namoro">💑 Namoro</option>
                        <option value="Casamento">💒 Casamento</option>
                        <option value="Viagem">✈️ Viagem</option>
                        <option value="Outro">🎉 Outro</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn" style="margin-top: 20px; background: linear-gradient(135deg, #1ABC9C, #16A085);">
                <i class="fas fa-plus"></i> Adicionar Data
            </button>
        </form>
    </div>
    
    <div class="card" style="text-align: center; background: linear-gradient(135deg, rgba(26, 188, 156, 0.1), rgba(22, 160, 133, 0.1));">
        <h3>⏰ Contagem Regressiva</h3>
        <div id="contagemRegressiva">
            <p style="font-size: 1.2rem; color: var(--texto-secundario);">
                Cadastre um evento para ver a contagem regressiva!
            </p>
        </div>
    </div>
    
    <div class="card">
        <div class="card-header">
            <h3>📅 Calendário de Eventos</h3>
        </div>
        <div class="cards-grid" id="gridEventos">
            <p style="text-align: center; grid-column: 1/-1; padding: 40px;">
                💕 Nenhum evento cadastrado. Adicione suas datas especiais!
            </p>
        </div>
    </div>
</div>
