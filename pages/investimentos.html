<div class="secao-investimentos fade-in">
    <div class="secao-header">
        <i class="fas fa-chart-line"></i>
        <h2>Investimentos do Casal</h2>
    </div>
    
    <div class="card">
        <div class="card-header">
            <h3>📈 Registrar Aporte</h3>
        </div>
        <form id="formAporte">
            <div class="form-grid">
                <div class="form-group">
                    <label>Valor do Aporte (R$)</label>
                    <input type="number" id="valorAporte" required step="0.01" placeholder="0,00">
                </div>
                <div class="form-group">
                    <label>Data</label>
                    <input type="date" id="dataAporte" required>
                </div>
            </div>
            <button type="submit" class="btn btn-info" style="margin-top: 20px;">
                <i class="fas fa-plus"></i> Registrar Aporte
            </button>
        </form>
    </div>
    
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon">💎</div>
            <div class="stat-label">Total Investido</div>
            <div class="stat-value" id="totalInvestido">R$ 0,00</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">🎯</div>
            <div class="stat-label">Rentabilidade Média</div>
            <div class="stat-value">12% a.a.</div>
        </div>
    </div>
    
    <div class="card">
        <h3>🧮 Simulador de Juros Compostos</h3>
        <div class="form-grid">
            <div class="form-group">
                <label>Valor Inicial (R$)</label>
                <input type="number" id="simInicial" value="1000" step="100">
            </div>
            <div class="form-group">
                <label>Aportes Mensais (R$)</label>
                <input type="number" id="simMensal" value="500" step="100">
            </div>
            <div class="form-group">
                <label>Taxa de Juros (% ao ano)</label>
                <input type="number" id="simTaxa" value="12" step="0.1">
            </div>
            <div class="form-group">
                <label>Tempo (anos)</label>
                <input type="number" id="simTempo" value="10" step="1">
            </div>
        </div>
        <button class="btn btn-info" onclick="simularJuros()" style="margin-top: 20px;">
            <i class="fas fa-calculator"></i> Calcular Projeção
        </button>
        <div style="margin-top: 30px; text-align: center;">
            <div class="stat-label">Resultado Projetado</div>
            <div class="stat-value" id="resultadoSimulacao" style="font-size: 2.5rem;">R$ 0,00</div>
        </div>
    </div>
    
    <div class="card">
        <h3>📊 Evolução do Patrimônio</h3>
        <div style="height: 300px;">
            <canvas id="graficoPatrimonio"></canvas>
        </div>
    </div>
</div>
