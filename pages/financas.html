<div class="secao-financas fade-in">
    <div class="secao-header">
        <i class="fas fa-coins"></i>
        <h2>Finanças Compartilhadas</h2>
    </div>
    
    <div class="card">
        <div class="card-header">
            <h3>📝 Adicionar Gasto</h3>
        </div>
        <form id="formGasto">
            <div class="form-grid">
                <div class="form-group">
                    <label>Nome da Despesa</label>
                    <input type="text" id="nomeGasto" required placeholder="Ex: Supermercado">
                </div>
                <div class="form-group">
                    <label>Valor (R$)</label>
                    <input type="number" id="valorGasto" required step="0.01" min="0.01" placeholder="0,00">
                </div>
                <div class="form-group">
                    <label>Categoria</label>
                    <select id="categoriaGasto" required>
                        <option value="">Selecione...</option>
                        <option value="Alimentação">🍕 Alimentação</option>
                        <option value="Lazer">🎉 Lazer</option>
                        <option value="Casa">🏠 Casa</option>
                        <option value="Transporte">🚗 Transporte</option>
                        <option value="Saúde">💊 Saúde</option>
                        <option value="Outros">📦 Outros</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Quem Pagou</label>
                    <select id="quemPagou" required>
                        <option value="">Selecione...</option>
                        <option value="Eu">👨 Eu</option>
                        <option value="Ela">👩 Ela</option>
                        <option value="Dividido">🤝 Dividido</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Data</label>
                    <input type="date" id="dataGasto" required>
                </div>
            </div>
            <button type="submit" class="btn" style="margin-top: 20px;">
                <i class="fas fa-plus"></i> Adicionar Gasto
            </button>
        </form>
    </div>
    
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Total do Mês</div>
            <div class="stat-value" id="totalMes">R$ 0,00</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Pago por Você</div>
            <div class="stat-value" id="totalEu">R$ 0,00</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Pago por Ela</div>
            <div class="stat-value" id="totalEla">R$ 0,00</div>
        </div>
    </div>
    
    <div class="card">
        <h3>Meta Mensal: R$ 2.000,00</h3>
        <div class="progress-bar">
            <div class="progress-fill" id="progressoMeta" style="width: 0%; background: linear-gradient(90deg, #2ECC71, #27AE60);"></div>
        </div>
    </div>
    
    <div class="card">
        <h3>📊 Gastos por Categoria</h3>
        <div style="height: 300px;">
            <canvas id="graficoCategorias"></canvas>
        </div>
    </div>
    
    <div class="card">
        <h3>📋 Histórico de Gastos</h3>
        <div id="listaGastos"></div>
    </div>
</div>
