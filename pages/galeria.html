<div class="secao-galeria fade-in">
    <div class="secao-header">
        <i class="fas fa-images"></i>
        <h2>Galeria de Momentos</h2>
    </div>
    
    <div class="card">
        <div class="card-header">
            <h3>📸 Adicionar Foto</h3>
        </div>
        <div class="form-grid">
            <div class="form-group">
                <label>Selecionar Imagem</label>
                <input type="file" id="uploadFoto" accept="image/*" style="padding: 10px;">
            </div>
            <div class="form-group">
                <label>Legenda da Foto</label>
                <input type="text" id="legendaFoto" placeholder="Descreva este momento especial...">
            </div>
        </div>
        <button class="btn" onclick="adicionarFoto()" style="margin-top: 20px; background: linear-gradient(135deg, #F39C12, #E67E22);">
            <i class="fas fa-upload"></i> Fazer Upload
        </button>
    </div>
    
    <div class="card">
        <div class="card-header">
            <h3>🖼️ Nossos Momentos</h3>
            <div>
                <button class="btn btn-sm" onclick="iniciarSlideshow()" style="background: linear-gradient(135deg, #F39C12, #E67E22);">
                    <i class="fas fa-play"></i> Slideshow
                </button>
                <button class="btn btn-sm btn-outline" onclick="pararSlideshow()">
                    <i class="fas fa-stop"></i> Parar
                </button>
            </div>
        </div>
        
        <div id="slideshowContainer" style="text-align: center; margin-bottom: 20px; display: none;">
            <img id="slideshowImg" src="" style="max-width: 100%; max-height: 500px; border-radius: 15px; box-shadow: var(--sombra-destaque);">
            <p id="slideshowLegenda" style="margin-top: 10px; font-style: italic; color: var(--texto-secundario);"></p>
        </div>
        
        <div class="cards-grid" id="gridFotos">
            <p style="text-align: center; grid-column: 1/-1; padding: 40px;">
                📸 Nenhuma foto ainda. Comece a registrar seus momentos especiais!
            </p>
        </div>
    </div>
</div>
