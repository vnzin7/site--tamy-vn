<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso Planejamento - Site do Casal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <style>
        /* ============ ESTILOS (MESMO CSS DE ANTES) ============ */
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --success: #10b981;
            --success-light: #34d399;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --dark: #0f172a;
            --gray-900: #1e293b;
            --gray-800: #334155;
            --gray-700: #475569;
            --gray-600: #64748b;
            --gray-500: #94a3b8;
            --gray-400: #cbd5e1;
            --gray-300: #e2e8f0;
            --gray-200: #f1f5f9;
            --gray-100: #f8fafc;
            --white: #ffffff;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.12);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.07);
            --shadow-lg: 0 10px 25px rgba(0,0,0,0.1);
            --shadow-xl: 0 20px 50px rgba(0,0,0,0.15);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-tema="escuro"] {
            --dark: #f8fafc;
            --gray-900: #f1f5f9;
            --gray-800: #e2e8f0;
            --gray-700: #cbd5e1;
            --gray-600: #94a3b8;
            --gray-500: #64748b;
            --gray-400: #475569;
            --gray-300: #334155;
            --gray-200: #1e293b;
            --gray-100: #0f172a;
            --white: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-100);
            color: var(--dark);
            line-height: 1.6;
            min-height: 100vh;
            transition: var(--transition);
        }

        .container { max-width: 1440px; margin: 0 auto; padding: 0 24px; }

        .header {
            background: var(--white);
            border-bottom: 1px solid var(--gray-300);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            cursor: pointer;
        }

        .nav {
            display: flex;
            gap: 4px;
            background: var(--gray-200);
            padding: 4px;
            border-radius: var(--radius-lg);
        }

        .nav a {
            padding: 10px 20px;
            border-radius: var(--radius-md);
            color: var(--gray-600);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            white-space: nowrap;
        }

        .nav a:hover { color: var(--dark); background: var(--white); }
        .nav a.ativo { background: var(--white); color: var(--primary); box-shadow: var(--shadow-sm); font-weight: 600; }

        .header-actions { display: flex; gap: 8px; align-items: center; }

        .btn-icon {
            width: 40px; height: 40px;
            border: 1px solid var(--gray-300);
            border-radius: var(--radius-md);
            background: var(--white);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gray-600);
            transition: var(--transition);
        }

        .btn-icon:hover { border-color: var(--primary); color: var(--primary); }

        .menu-mobile-btn { display: none; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--dark); }

        .nav-mobile {
            display: none;
            position: absolute;
            top: 100%; left: 0; right: 0;
            background: var(--white);
            border-bottom: 1px solid var(--gray-300);
            padding: 16px;
            box-shadow: var(--shadow-lg);
            flex-direction: column;
            gap: 4px;
            z-index: 99;
        }

        .nav-mobile.ativo { display: flex; }

        .nav-mobile a {
            padding: 12px 16px;
            border-radius: var(--radius-md);
            color: var(--gray-600);
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .nav-mobile a:hover, .nav-mobile a.ativo { background: var(--primary); color: white; }

        .main-content { padding: 32px 0; }
        .secao { display: none; animation: fadeSlideIn 0.4s ease; }
        .secao.ativa { display: block; }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .welcome-banner {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            padding: 40px;
            border-radius: var(--radius-xl);
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .welcome-banner h2 { font-size: 2rem; margin-bottom: 8px; }
        .welcome-banner p { opacity: 0.9; }

        .welcome-stats { display: flex; gap: 32px; }
        .welcome-stat-item { text-align: center; }
        .welcome-stat-item span { display: block; font-size: 1.8rem; font-weight: 700; }
        .welcome-stat-item small { opacity: 0.8; }

        .section-header { margin-bottom: 32px; }
        .section-header h2 { font-size: 2rem; display: flex; align-items: center; gap: 12px; }

        .card {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 28px;
            border: 1px solid var(--gray-300);
            box-shadow: var(--shadow-sm);
            margin-bottom: 24px;
        }

        .card-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 24px; }

        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
        .grid-auto { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }

        .stat-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 24px;
            border: 1px solid var(--gray-300);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .stat-icon {
            width: 52px; height: 52px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .bg-primary { background: rgba(99,102,241,0.1); color: var(--primary); }
        .bg-success { background: rgba(16,185,129,0.1); color: var(--success); }
        .bg-warning { background: rgba(245,158,11,0.1); color: var(--warning); }
        .bg-info { background: rgba(59,130,246,0.1); color: var(--info); }

        .stat-info small { display: block; font-size: 0.8rem; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-info strong { font-size: 1.5rem; font-weight: 700; }

        .progress { height: 12px; background: var(--gray-200); border-radius: 6px; overflow: hidden; margin: 8px 0; }
        .progress-bar { height: 100%; border-radius: 6px; transition: width 0.6s ease; }
        .progress-primary { background: linear-gradient(90deg, #6366f1, #818cf8); }
        .progress-success { background: linear-gradient(90deg, #10b981, #34d399); }

        .progress-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 0.85rem; font-weight: 500; color: var(--gray-700); margin-bottom: 6px; }

        .form-input, .form-select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--gray-300);
            border-radius: var(--radius-md);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            color: var(--dark);
            background: var(--white);
            transition: var(--transition);
        }

        .form-input:focus, .form-select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }

        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }

        .btn {
            padding: 12px 24px;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { background: #059669; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--gray-300); color: var(--gray-700); }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
        .btn-sm { padding: 8px 16px; font-size: 0.8rem; }
        .btn-full { width: 100%; justify-content: center; margin-top: 16px; }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-primary { background: rgba(99,102,241,0.1); color: var(--primary); }
        .badge-success { background: rgba(16,185,129,0.1); color: var(--success); }
        .badge-warning { background: rgba(245,158,11,0.1); color: var(--warning); }
        .badge-danger { background: rgba(239,68,68,0.1); color: var(--danger); }

        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px 16px; background: var(--gray-100); color: var(--gray-600); font-weight: 600; font-size: 0.8rem; text-transform: uppercase; border-bottom: 1px solid var(--gray-300); }
        td { padding: 16px; border-bottom: 1px solid var(--gray-200); }
        tr:hover td { background: var(--gray-50); }

        .chart-container { position: relative; height: 300px; width: 100%; }

        .meta-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 24px;
            border: 1px solid var(--gray-300);
        }

        .meta-card-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 20px;
        }

        .meta-card-values {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 16px 0;
        }

        .meta-card-saved { font-size: 1.8rem; font-weight: 700; color: var(--primary); }
        .meta-card-goal { font-size: 1rem; color: var(--gray-500); }
        .meta-card-actions { display: flex; gap: 8px; margin-top: 16px; }

        .simulacao-resultado {
            margin-top: 20px;
            text-align: center;
            padding: 20px;
            background: var(--gray-100);
            border-radius: var(--radius-md);
        }

        .simulacao-resultado small { display: block; color: var(--gray-500); margin-bottom: 8px; }
        .simulacao-resultado strong { font-size: 2rem; font-weight: 700; color: var(--primary); }

        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            background: var(--white);
            border: 1px solid var(--gray-300);
            padding: 16px 20px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-xl);
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 300px;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .sync-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--gray-100);
            border-radius: var(--radius-md);
            font-size: 0.8rem;
        }

        .sync-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .sync-dot.online { background: var(--success); animation: pulse 2s infinite; }
        .sync-dot.offline { background: var(--danger); }
        .sync-dot.syncing { background: var(--warning); animation: pulse 1s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @media (max-width: 1024px) {
            .grid-4 { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 768px) {
            .nav { display: none; }
            .menu-mobile-btn { display: block; }
            .header { padding: 12px 16px; }
            .grid-2, .grid-4 { grid-template-columns: 1fr; }
            .grid-auto { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
            .welcome-banner { padding: 24px; }
            .welcome-banner h2 { font-size: 1.5rem; }
        }

        @media (max-width: 480px) {
            .container { padding: 0 12px; }
            .card { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>

    <header class="header">
        <a class="logo" onclick="mostrarSecao('dashboard')">
            <i class="fas fa-chart-pie"></i>
            Nosso Planejamento
        </a>
        
        <button class="menu-mobile-btn" id="btnMenu">
            <i class="fas fa-bars"></i>
        </button>
        
        <nav class="nav" id="navDesktop">
            <a onclick="mostrarSecao('dashboard')" data-secao="dashboard" class="ativo">
                <i class="fas fa-home"></i> Dashboard
            </a>
            <a onclick="mostrarSecao('financas')" data-secao="financas">
                <i class="fas fa-wallet"></i> Finanças
            </a>
            <a onclick="mostrarSecao('metas')" data-secao="metas">
                <i class="fas fa-bullseye"></i> Metas
            </a>
            <a onclick="mostrarSecao('presentes')" data-secao="presentes">
                <i class="fas fa-gift"></i> Presentes
            </a>
            <a onclick="mostrarSecao('musicas')" data-secao="musicas">
                <i class="fas fa-music"></i> Músicas
            </a>
            <a onclick="mostrarSecao('galeria')" data-secao="galeria">
                <i class="fas fa-images"></i> Galeria
            </a>
            <a onclick="mostrarSecao('datas')" data-secao="datas">
                <i class="fas fa-calendar"></i> Datas
            </a>
        </nav>
        
        <nav class="nav-mobile" id="navMobile">
            <a onclick="mostrarSecao('dashboard')"><i class="fas fa-home"></i> Dashboard</a>
            <a onclick="mostrarSecao('financas')"><i class="fas fa-wallet"></i> Finanças</a>
            <a onclick="mostrarSecao('metas')"><i class="fas fa-bullseye"></i> Metas</a>
            <a onclick="mostrarSecao('presentes')"><i class="fas fa-gift"></i> Presentes</a>
            <a onclick="mostrarSecao('musicas')"><i class="fas fa-music"></i> Músicas</a>
            <a onclick="mostrarSecao('galeria')"><i class="fas fa-images"></i> Galeria</a>
            <a onclick="mostrarSecao('datas')"><i class="fas fa-calendar"></i> Datas</a>
        </nav>
        
        <div class="header-actions">
            <div class="sync-status">
                <span class="sync-dot" id="syncDot"></span>
                <span id="syncText">Online</span>
            </div>
            <button class="btn-icon" onclick="alternarTema()" title="Alternar tema">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <!-- MESMO CONTEÚDO HTML DAS SEÇÕES DO ARQUIVO ANTERIOR -->
            <!-- COPIE E COLE AQUI TODO O HTML DAS SEÇÕES (dashboard, financas, metas, etc.) -->
            <!-- O HTML é IDÊNTICO ao que já te passei antes -->
        </div>
    </main>

    <script>
        // ============ CONFIGURAÇÃO JSONBIN ============
        const JSONBIN_CONFIG = {
            BIN_ID: 'https://api.jsonbin.io/v3/b/6a4c6000f5f4af5e296a0ea8',  // ← COLE AQUI
            API_KEY: 'COLE_SUA_API_KEY_AQUI', // ← COLE AQUI
            URL: 'https://api.jsonbin.io/v3/b'
        };

        // Estado Global
        let AppState = {
            gastos: [],
            metas: [],
            presentes: [],
            musicas: [],
            fotos: [],
            eventos: [],
            tema: 'claro',
            metaMensal: 2000
        };

        let graficoPizza = null;
        let isSyncing = false;

        // Inicialização
        document.addEventListener('DOMContentLoaded', async () => {
            await carregarDados();
            mostrarSecao('dashboard');
            aplicarTema();
            configurarData();
            
            document.getElementById('btnMenu').addEventListener('click', () => {
                document.getElementById('navMobile').classList.toggle('ativo');
            });

            // Sincronizar a cada 5 segundos
            setInterval(sincronizarAutomatico, 5000);
        });

        // ============ SINCRONIZAÇÃO COM JSONBIN ============
        async function carregarDados() {
            updateSyncStatus('syncing', 'Carregando...');
            
            try {
                const response = await fetch(`${JSONBIN_CONFIG.URL}/${JSONBIN_CONFIG.BIN_ID}/latest`, {
                    headers: {
                        'X-Master-Key': JSONBIN_CONFIG.API_KEY
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    AppState = { ...AppState, ...data.record };
                    updateSyncStatus('online', 'Online');
                    console.log('✅ Dados carregados da nuvem');
                }
            } catch (error) {
                console.log('⚠️ Offline - usando dados locais');
                carregarDadosLocais();
                updateSyncStatus('offline', 'Offline');
            }
        }

        async function salvarDados() {
            if (isSyncing) return;
            isSyncing = true;
            
            updateSyncStatus('syncing', 'Salvando...');
            
            try {
                const response = await fetch(`${JSONBIN_CONFIG.URL}/${JSONBIN_CONFIG.BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_CONFIG.API_KEY,
                        'X-Bin-Versioning': 'false'
                    },
                    body: JSON.stringify(AppState)
                });
                
                if (response.ok) {
                    updateSyncStatus('online', 'Online');
                    console.log('✅ Dados salvos na nuvem');
                }
            } catch (error) {
                console.log('⚠️ Erro ao salvar - salvando localmente');
                salvarDadosLocais();
                updateSyncStatus('offline', 'Offline');
            }
            
            // Sempre salva backup local
            salvarDadosLocais();
            isSyncing = false;
        }

        async function sincronizarAutomatico() {
            try {
                const response = await fetch(`${JSONBIN_CONFIG.URL}/${JSONBIN_CONFIG.BIN_ID}/latest`, {
                    headers: {
                        'X-Master-Key': JSONBIN_CONFIG.API_KEY
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    const cloudData = JSON.stringify(data.record);
                    const localData = JSON.stringify({
                        gastos: AppState.gastos,
                        metas: AppState.metas,
                        presentes: AppState.presentes,
                        musicas: AppState.musicas,
                        fotos: AppState.fotos,
                        eventos: AppState.eventos,
                        tema: AppState.tema,
                        metaMensal: AppState.metaMensal
                    });
                    
                    if (cloudData !== localData) {
                        AppState = { ...AppState, ...data.record };
                        atualizarTelaAtual();
                        console.log('🔄 Dados atualizados da nuvem');
                    }
                }
            } catch (error) {
                // Silencioso - offline
            }
        }

        function updateSyncStatus(status, text) {
            const dot = document.getElementById('syncDot');
            const textEl = document.getElementById('syncText');
            
            if (dot) {
                dot.className = 'sync-dot';
                if (status === 'online') dot.classList.add('online');
                else if (status === 'offline') dot.classList.add('offline');
                else if (status === 'syncing') dot.classList.add('syncing');
            }
            
            if (textEl) textEl.textContent = text;
        }

        function carregarDadosLocais() {
            const dados = localStorage.getItem('appState');
            if (dados) {
                try { AppState = { ...AppState, ...JSON.parse(dados) }; } catch(e) {}
            }
        }

        function salvarDadosLocais() {
            localStorage.setItem('appState', JSON.stringify(AppState));
        }

        function atualizarTelaAtual() {
            const paginaAtual = document.querySelector('.secao.ativa')?.id.replace('secao-', '');
            if (paginaAtual === 'dashboard') atualizarDashboard();
            else if (paginaAtual === 'financas') atualizarFinancas();
            else if (paginaAtual === 'metas') atualizarMetas();
            else if (paginaAtual === 'presentes') atualizarPresentes();
            else if (paginaAtual === 'musicas') atualizarMusicas();
            else if (paginaAtual === 'galeria') atualizarGaleria();
            else if (paginaAtual === 'datas') atualizarEventos();
        }

        // ============ FUNÇÕES (COPIAR DO ARQUIVO ANTERIOR) ============
        // Cole aqui TODAS as funções do main.js anterior
        // (mostrarSecao, adicionarGasto, adicionarMeta, etc.)
        // São exatamente as mesmas funções!
    </script>
</body>
</html>
